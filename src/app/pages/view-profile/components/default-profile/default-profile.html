<div class="mt-3 px-4">
  <h3 class="heading-h3 neutral-01 mb-4">Hosted Events</h3>
  
  @if (eventCards.length === 0) {
    <!-- Empty State -->
    <div class="flex flex-col items-center justify-center py-12 px-4">
      <!-- Calendar Icon with X -->
      <div class="relative mb-6">
        <div class="w-24 h-24 bg-gray-100 rounded-2xl flex items-center justify-center shadow-lg">
          <i class="pi pi-calendar text-5xl text-gray-400"></i>
        </div>
        <div class="absolute -top-1 -right-1 w-6 h-6 bg-gray-300 rounded-full flex items-center justify-center">
          <i class="pi pi-times text-xs text-gray-600"></i>
        </div>
      </div>
      
      <!-- Heading -->
      <h3 class="text-xl font-semibold text-gray-900 mb-2 text-center">No Hosted Events Yet</h3>
      
      <!-- Sub-heading -->
      <p class="text-sm text-gray-500 mb-6 text-center">Create your first event now!</p>
      
      <!-- Create Event Button -->
      <button 
        class="flex items-center justify-center gap-2 px-6 py-3 bg-[#F5BC61] rounded-lg text-gray-900 font-semibold shadow-md hover:opacity-90 transition-opacity"
        (click)="createEvent()">
        <i class="pi pi-plus text-lg"></i>
        <span>Create Event</span>
      </button>
    </div>
  } @else {
    <div class="flex flex-col gap-4">
      <div *ngFor="let event of eventCards">
      <div
        class="relative w-full h-[320px] rounded-[16px] overflow-hidden bg-cover bg-center"
        [ngStyle]="{ 'background-image': 'url(' + event.image + ')' }"
      >
        <!-- Dark Overlay at Bottom -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent"></div>

        <!-- Top Left: Views -->
        <div class="absolute top-2 left-2 z-10">
          <div
            class="flex p-2 justify-center items-center gap-2 rounded-full border border-white/10 bg-black/20 shadow-[4px_8px_16px_0_rgba(0,0,0,0.25)] backdrop-blur-[3px]"
          >
            <div class="body-12 neutral-07">{{ event.views }}</div>
          </div>
        </div>

        <!-- Top Right: Icons -->
        <div class="absolute top-2 right-2 z-10 flex items-center gap-2">
          <div
            class="flex !w-[32px] !h-[32px] !min-w-[32px] !min-h-[32px] justify-center items-center gap-2 rounded-full border border-white/10 bg-black/10 shadow-[4px_8px_16px_0_rgba(0,0,0,0.25)] backdrop-blur-[3px]"
          >
            <i class="pi pi-upload text-white !text-[14px]"></i>
          </div>
          <div
            class="flex !w-[32px] !h-[32px] !min-w-[32px] !min-h-[32px] justify-center items-center gap-2 rounded-full border border-white/10 bg-black/10 shadow-[4px_8px_16px_0_rgba(0,0,0,0.25)] backdrop-blur-[3px]"
          >
            <i class="pi pi-heart text-white !text-[14px]"></i>
          </div>
        </div>

        <!-- Bottom Content -->
        <div class="absolute bottom-0 left-0 right-0 p-2 z-10">
          <div
            class="flex flex-col p-2 px-3 pb-3 items-start gap-2 self-stretch rounded-xl border border-white/10 bg-[rgba(25,25,25,0.40)] backdrop-blur-sm"
          >
            <div class="flex flex-col gap-0.5">
              <div class="body-16SB neutral-07">{{ event.title }}</div>
              <div class="body-12 neutral-05">{{ event.organization }}</div>
            </div>
            <div class="h-[1px] w-full bg-white/10"></div>
            <div class="flex items-start gap-1 flex-col">
              <div class="flex items-center gap-1.5">
                <i class="pi pi-calendar neutral-07 !text-[12px]"></i>
                <span class="body-12 neutral-05">{{ event.date }}</span>
              </div>
              <div class="flex items-center gap-1.5">
                <i class="pi pi-map-marker neutral-07 !text-[12px]"></i>
                <span class="body-12 neutral-05">{{ event.location }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>
  }
</div>
