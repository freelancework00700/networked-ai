<div class="relative w-full min-h-screen bg-gray-100 p-8 px-4 flex flex-col items-center justify-center gap-8">
  <!-- Close Button -->
  <button 
    class="absolute top-4 right-4 z-10 bg-white rounded-full p-2 shadow-md"
    (click)="close()">
    <ion-icon name="close" class="text-2xl text-gray-900"></ion-icon>
  </button>

  <!-- Profile Card -->
  <div class="relative w-full max-w-[340px] bg-white rounded-3xl border-2 border-[#D4AF37] p-8 shadow-lg overflow-hidden">
    <!-- Background Pattern -->
    <div class="absolute inset-0 bg-gradient-to-br from-gray-900 to-gray-800 opacity-5 z-0"></div>
    
    <!-- Profile Content -->
    <div class="relative z-10 flex flex-col items-center gap-6">
      <!-- Profile Picture -->
      <div class="w-[72px] h-[72px] rounded-full overflow-hidden border-[3px] border-[#D4AF37] bg-gradient-to-br from-indigo-500 to-purple-600">
        <img 
          src="/assets/svg/user_image.svg" 
          [alt]="userName()" 
          class="w-full h-full object-cover rounded-full" />
      </div>

      <!-- Name and Username -->
      <div class="text-center flex flex-col gap-0">
        <h2 class="heading-h2 neutral-01">{{ userName() }}</h2>
        <p class="body-14R neutral-03">{{ username() }}</p>
      </div>

      <!-- QR Code -->
      <div class="p-4 bg-white rounded-xl border-2 border-[#D4AF37] flex items-center justify-center">
        <img 
          [src]="qrCodeUrl()" 
          alt="QR Code" 
          class="w-[120px] h-[120px] block" />
      </div>

      <!-- Shareable Link -->
      <div class="w-full flex items-center gap-3 px-4 py-3 bg-gray-100 rounded-xl border border-gray-200">
        <img src="/assets/svg/link.svg" alt="Link" class="w-5 h-5 flex-shrink-0" />
        <span class="flex-1 text-sm text-gray-900 overflow-hidden text-ellipsis whitespace-nowrap">{{ shareableLink() }}</span>
        <button 
          class="bg-transparent border-none cursor-pointer p-1 flex items-center justify-center flex-shrink-0"
          (click)="copyLink()">
          <img src="/assets/svg/copy.svg" alt="Copy" class="w-5 h-5" />
        </button>
      </div>

      <!-- Download Button -->
      <button 
        class="w-full h-12 flex items-center justify-center gap-2 p-4 bg-[#F5BC61] border-none rounded-xl text-gray-900 text-base font-semibold cursor-pointer transition-all duration-200 hover:opacity-90 hover:-translate-y-0.5 active:translate-y-0"
        (click)="downloadProfile()">
        <span class="body-14SB neutral-01">Download</span>
        <img src="/assets/svg/download.svg" alt="Download" class="w-5 h-5" />
      </button>
    </div>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="w-full max-w-[500px] flex justify-around items-center py-4 bg-white rounded-2xl shadow-sm">
    <button 
      class="flex flex-col items-center gap-2 bg-transparent border-none cursor-pointer p-2 transition-all duration-200 hover:opacity-70"
      (click)="handleContact()">
      <ion-icon name="people-outline" class="text-2xl text-gray-900"></ion-icon>
      <span class="text-xs text-gray-500 font-medium">Contact</span>
    </button>
    <button 
      class="flex flex-col items-center gap-2 bg-transparent border-none cursor-pointer p-2 transition-all duration-200 hover:opacity-70"
      (click)="handleShareTo()">
      <ion-icon name="share-outline" class="text-2xl text-gray-900"></ion-icon>
      <span class="text-xs text-gray-500 font-medium">Share to</span>
    </button>
    <button 
      class="flex flex-col items-center gap-2 bg-transparent border-none cursor-pointer p-2 transition-all duration-200 hover:opacity-70"
      (click)="handleChat()">
      <ion-icon name="chatbubble-outline" class="text-2xl text-gray-900"></ion-icon>
      <span class="text-xs text-gray-500 font-medium">Chat</span>
    </button>
    <button 
      class="flex flex-col items-center gap-2 bg-transparent border-none cursor-pointer p-2 transition-all duration-200 hover:opacity-70"
      (click)="handleMessenger()">
      <ion-icon name="flash-outline" class="text-2xl text-gray-900"></ion-icon>
      <span class="text-xs text-gray-500 font-medium">Messenger</span>
    </button>
    <button 
      class="flex flex-col items-center gap-2 bg-transparent border-none cursor-pointer p-2 transition-all duration-200 hover:opacity-70"
      (click)="handleStory()">
      <ion-icon name="camera-outline" class="text-2xl text-gray-900"></ion-icon>
      <span class="text-xs text-gray-500 font-medium">Story</span>
    </button>
  </div>
</div>
